$font = JetBrains Mono

# Catppuccin Mocha colors
$base = rgb(30, 30, 46)
$text = rgb(205, 214, 244)
$subtext0 = rgb(166, 173, 200)
$green = rgb(166, 227, 161)
$teal = rgb(148, 226, 213)
$blue = rgb(137, 180, 250)
$red = rgb(243, 139, 168)
$peach = rgb(250, 179, 135)

general {
    hide_cursor = false
}

animations {
    enabled = true
    bezier = linear, 1, 1, 0, 0
    animation = fadeIn, 1, 5, linear
    animation = fadeOut, 1, 5, linear
    animation = inputFieldDots, 1, 2, linear
}

background {
    monitor = DP-3
    path = ~/.config/wallpapers/466809.jpg
    # path = screenshot
    blur_passes = 3
    blur_size = 5
    brightness = 0.8
}

background {
    monitor = DP-2
    # path = ~/.config/wallpapers/466809.jpg
    path = screenshot
    blur_passes = 3
    blur_size = 5
    brightness = 0.8
}

input-field {
    monitor = DP-3
    size = 700, 100
    outline_thickness = 4
    inner_color = rgba(30, 30, 46, 0.5)
    outer_color = rgba(166, 227, 161, 0.9) rgba(148, 226, 213, 0.9) 45deg  # green → teal
    check_color = rgba(166, 227, 161, 0.9) rgba(137, 180, 250, 0.9) 120deg  # green → blue
    fail_color = rgba(243, 139, 168, 0.9) rgba(250, 179, 135, 0.9) 40deg    # red → peach
    font_color = $text
    fade_on_empty = false
    rounding = 15
    font_family = $font
    placeholder_text = 
    fail_text = $PAMFAIL
    dots_spacing = 0.3
    position = 0, -100
    halign = center
    valign = center
}

# TIME - centered top
label {
    monitor = DP-3
    text = $TIME
    font_size = 150
    font_family = $font
    color = $text
    position = 0, -50
    halign = center
    valign = top
}

# DATE - below time
label {
    monitor = DP-3
    text = cmd[update:60000] date +"%A, %d %B %Y"
    font_size = 30
    font_family = $font
    color = $subtext0
    position = 0, -300
    halign = center
    valign = top
}
label {
       monitor = DP-3
       text = ─── $USER ───
       font_size = 32
       color = $teal
       position = 0, 0
       halign = center
       valign = center
   }
